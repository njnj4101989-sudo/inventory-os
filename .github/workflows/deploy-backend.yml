name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ['backend/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/inventory-os
            git pull origin main
            cd backend
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            alembic upgrade head
            sudo systemctl restart fastapi
            sleep 3
            curl -sf http://localhost:8000/api/v1/health > /dev/null && echo "✅ Health check passed" || echo "❌ Health check failed"
